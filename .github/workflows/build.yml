name: Build & Analyze Flutter App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.3'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.3'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (CI validation)
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: studygrades-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

  build-web:
    name: Build Web Release
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.3'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      - name: Upload Web artifact
        uses: actions/upload-artifact@v6
        with:
          name: studygrades-web
          path: build/web/
          retention-days: 30

  production-smoke:
    name: Production API Smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Verify public and protected endpoints
        shell: bash
        run: |
          set -euo pipefail
          base="https://studygrades-2026.netlify.app/api/mobile"

          health="$(curl --fail --silent --show-error --retry 4 --retry-all-errors "$base/")"
          node -e 'const body=JSON.parse(process.argv[1]); if(body.status!=="running") process.exit(1)' "$health"

          admin_status="$(curl --silent --show-error --output /tmp/admin.json --write-out '%{http_code}' "$base/admin/users/")"
          test "$admin_status" = "401"

          webhook_status="$(curl --silent --show-error --request POST --header 'content-type: application/json' --data '{}' --output /tmp/webhook.json --write-out '%{http_code}' "$base/billing/paymob/webhook/")"
          test "$webhook_status" = "401"

          return_headers="$(curl --fail --silent --show-error --head "https://studygrades-2026.netlify.app/api/mobile/billing/paymob/return/")"
          grep -qi '^content-security-policy:' <<<"$return_headers"
