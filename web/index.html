<head>

  <meta property="og:locale" content="ar_EG">

  <title>StudyGrades 2026 - رصد الدرجات الصوتي</title>

  <style>
    /* Pre-load splash to avoid white flash before Flutter renders */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #0D47A1 0%, #1565C0 50%, #1976D2 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Cairo", sans-serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #splash-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0D47A1 0%, #1565C0 50%, #1976D2 100%);
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }
    #splash-loader.hidden { opacity: 0; pointer-events: none; }
    .splash-icon {
      width: 130px;
      height: 130px;
      background: white;
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3), 0 0 60px rgba(255,255,255,0.3);
      animation: pulse 2s ease-in-out infinite;
    }
    .splash-icon svg { width: 78px; height: 78px; fill: #1976D2; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.05); }
    }
    .splash-title {
      color: white;
      font-size: 28px;
      font-weight: bold;
      margin-top: 28px;
      letter-spacing: 1px;
      text-shadow: 0 3px 8px rgba(0,0,0,0.3);
    }
    .splash-sub {
      color: rgba(255,255,255,0.9);
      font-size: 14px;
      margin-top: 8px;
      padding: 6px 14px;
      background: rgba(255,255,255,0.18);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.3);
    }
    .splash-loading {
      margin-top: 50px;
      display: flex;
      gap: 8px;
    }
    .splash-loading span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: white;
      animation: bounce 1.4s infinite ease-in-out;
    }
    .splash-loading span:nth-child(1) { animation-delay: -0.32s; }
    .splash-loading span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40%           { transform: scale(1.0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="splash-loader">
    <div class="splash-icon">
      <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
    </div>
    <div class="splash-title">StudyGrades 2026</div>
    <div class="splash-sub">🎤 جاري تحميل التطبيق...</div>
    <div class="splash-loading"><span></span><span></span><span></span></div>
  </div>

  <script>
    // PWA Service Worker registration handled by Flutter automatically
    // Hide splash when Flutter is ready
    window.addEventListener('flutter-first-frame', function () {
      const splash = document.getElementById('splash-loader');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(() => splash.remove(), 500);
      }
    });

    // Detect installation prompt for "Install App" support
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      window.flutterInstallPromptAvailable = true;
    });
    window.triggerPWAInstall = function () {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
      }
    };
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
