<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="نظام رصد الدرجات الصوتي">

  <!-- Favicon -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>نظام رصد الدرجات الصوتي</title>
  <meta name="description" content="Study Grades Voice — نظام رصد الدرجات الصوتي للمعلمين">

  <style>
    /* Loading screen */
    body {
      margin: 0;
      padding: 0;
      background-color: #1565C0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Cairo', sans-serif;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    #loading-icon {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    #loading-text {
      color: white;
      font-size: 16px;
      opacity: 0.9;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div id="loading-icon">🎤</div>
    <div class="spinner"></div>
    <div id="loading-text">جاري تحميل التطبيق...</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
