name: voice_grader
description: "StudyGrades 2026 - نظام رصد الدرجات الصوتي الاحترافي للمعلمين"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: 6.1.5+1

  # Networking
  http: 1.5.0
  dio: ^5.7.0

  # Local Storage
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0
  flutter_secure_storage: ^9.2.2

  # Voice Recording & Speech
  record: 5.0.5
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1
  audioplayers: ^6.1.0

  # UI Enhancements
  fluttertoast: ^8.2.8
  flutter_spinkit: ^5.2.1
  google_fonts: ^6.2.1
  animated_text_kit: ^4.2.2
  lottie: ^3.1.3
  shimmer: ^3.0.0

  # Connectivity / Offline
  connectivity_plus: ^6.0.5

  # Utilities
  intl: ^0.20.2
  path_provider: ^2.1.4
  share_plus: ^10.1.2
  csv: ^6.0.0
  path: ^1.9.0
  uuid: ^4.5.1
  excel: ^4.0.6

  # Charts & Visualization
  fl_chart: ^0.69.0
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.2.0+3

dependency_overrides:
  record_platform_interface: 1.2.0
  record_linux: 0.7.2
  record_windows: 1.0.4
  record_web: 1.1.3
  record_darwin: 1.2.0
  record_android: 1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
