name: study_grades_voice
description: نظام رصد الدرجات الصوتي للمعلمين - Study Grades Voice by م. باسل أشرف
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Fonts
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  percent_indicator: ^4.2.4
  fl_chart: ^0.69.0

  # State Management
  provider: 6.1.5+1

  # Storage - Local
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0
  flutter_secure_storage: ^9.2.4

  # Network
  dio: ^5.8.0+1
  connectivity_plus: ^6.1.4

  # Voice & Audio
  speech_to_text: ^7.0.0
  record: ^5.2.1
  permission_handler: ^11.4.0

  # Utilities
  path_provider: ^2.1.5
  path: ^1.9.1
  intl: ^0.19.0
  share_plus: ^10.1.4
  csv: ^6.0.0
  excel: ^4.0.6
  fluttertoast: ^8.2.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/icons/
    - assets/icon/
    - assets/images/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
