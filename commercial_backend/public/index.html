<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>StudyGrades API</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7fb;
        color: #172033;
      }

      main {
        width: min(90vw, 560px);
        padding: 32px;
        border: 1px solid #d9e2f1;
        border-radius: 8px;
        background: #ffffff;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #526071;
      }

      code {
        color: #1167c5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>StudyGrades API</h1>
      <p>
        Backend service is deployed. Mobile API health is available at
        <code>/api/mobile/</code>.
      </p>
    </main>
  </body>
</html>
